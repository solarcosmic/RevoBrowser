<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revo</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        #container {
            /* From https://css.glass */
            background: rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(15.8px);
            -webkit-backdrop-filter: blur(15.8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 100%;
            height: 100%;
            box-sizing: border-box;
        }
        #webviews {
            display: flex;
            justify-content: flex-end;
            height: 100vh;
            border-radius: 16px;
            overflow: hidden;
        }
        #webviews webview {
            background-color: #ffffff;
            width: 100vw;
            height: 100vh;
            border: none;
        }
        #topbar {
            position: absolute;
            width: 100vw;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="topbar" style="display: none;">
            <button>Topbar</button>
            <input type="text"></input>
        </div>
        <div id="catcher" style="position: absolute; top: 0; left: 0; width: 100vw; height: calc(100vh/16); z-index: 9999;"></div>
        <div id="webviews">
            <webview src="https://www.google.com/" nodeintegration></webview>
        </div>
    </div>
</body>
<script>
    const catcher = document.getElementById("catcher")
    catcher.addEventListener("mousemove", (event) => {
        document.getElementById("topbar").style.display = "block";
        catcher.style.pointerEvents = "none";
    })
    catcher.addEventListener("mouseleave", (event) => {
        document.getElementById("topbar").style.display = "none";
        catcher.style.pointerEvents = "auto";
    })
    /*        const checkTop16 = event.clientY <= window.innerHeight / 16;
        if (checkTop16) {
            document.getElementById("topbar").style.display = "block";
        } else {
            document.getElementById("topbar").style.display = "none";
        }*/
</script>
</html>
