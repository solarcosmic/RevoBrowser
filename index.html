<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revo</title>
    <style>
        @font-face {
            font-family: 'Golos Text';
            src: url("assets/GolosText-VariableFont_wght.ttf");
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: "Golos Text", sans-serif;
        }
        #container {
            /* From https://css.glass */
            background: rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(15.8px);
            -webkit-backdrop-filter: blur(15.8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 100%;
            height: 100%;
            box-sizing: border-box;
        }
        #webviews {
            display: flex;
            justify-content: flex-end;
            height: 100vh;
            border-radius: 16px;
            overflow: hidden;
        }
        #webviews webview {
            background-color: #ffffff;
            width: 100vw;
            height: 100vh;
            border: none;
        }
        #topbar {
            position: absolute;
            width: 100vw;
            z-index: 999;
            display: flex;
            justify-content: center;
        }
        #topbar div {
            background-color: rgba(0, 0, 0, 0.5);
            padding: 4px 4px;
            color: #ffffff;
            width: 500px;
            border-radius: 8px;
        }
        #url-text, #url-text-drawer {
            text-align: center;
            font-size: 12px;
        }
        #appbar {
            position: absolute;
            width: 100vw;
            bottom: 0;
            z-index: 1000;
            display: flex;
            justify-content: center;
            pointer-events: none;
        }
        #appbar > div {
            pointer-events: auto;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 4px 4px;
            color: #ffffff;
            width: 500px;
            border-radius: 8px;
        }
        #appbar button {
            pointer-events: auto;
            width: 64px;
            height: 64px;
            background-color: #0000008e;
            border-radius: 8px;
        }
        #lowcatcher {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: calc(100vh / 16);
            z-index: 998;
        }

        #new-tab-button {
            margin-top: auto;
        }

        #newtab-img {
            filter: invert(100%) sepia(0%) saturate(0%) hue-rotate(0deg) brightness(100%) contrast(100%);
        }

        /*#topbar, #appbar {
            pointer-events: none;
        }

        #topbar *,
        #appbar * {
            pointer-events: auto;
        }*/
    </style>
</head>
<body>
    <div id="container">
        <div id="topbar" style="display: none;">
            <div><div id="url-text">search.google.com</div></div>
        </div>
        <div id="appbar" style="display: none;">
            <div>
                <div id="url-text-drawer">App Drawer</div>
                <div id="tabs">
                    <button id="new-tab-button">
                        <img id="newtab-img" src="assets/plus-solid-full.svg" style="width: 32px; height: 32px;">
                    </button>
                </div>
            </div>
        </div>
        <div id="catcher" style="position: absolute; top: 0; left: 0; width: 100vw; height: calc(100vh/16); z-index: 9999;"></div>
        <div id="lowcatcher"></div>
        <div id="webviews">
            
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
